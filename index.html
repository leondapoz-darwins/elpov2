<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ELPO v2</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto+Condensed:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/site.css" />
  <link rel="icon" type="image/jpeg" href="assets/logo.jpg" />
  <style>
    :root {
      --brand: #0064a8;
      --brand-dark: #004f86;
      --brand-light: #91b1d3;
      --bg: #ffffff;
      --bg-soft: #f9f9fb;
      --ink: #1a1f2b;
      --ink-soft: #4a4e57;
      --border: #e2e2e2;
      --shadow: 0 10px 40px rgba(0, 100, 168, 0.08), 0 2px 8px rgba(0,0,0,0.04);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 600px at 80% -10%, rgba(0,100,168,0.08), transparent 60%),
        radial-gradient(900px 500px at -10% 110%, rgba(145,177,211,0.18), transparent 60%),
        var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    header {
      padding: 28px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header img { height: 44px; width: auto; display: block; }
    header .lang {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* --- Gate --- */
    .gate {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: var(--shadow);
    }
    .gate .badge {
      display: inline-block;
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brand);
      background: rgba(0,100,168,0.08);
      padding: 6px 12px;
      border-radius: 999px;
      margin-bottom: 20px;
    }
    .gate h1 {
      font-family: 'Roboto Condensed', sans-serif;
      font-weight: 700;
      font-size: 32px;
      line-height: 1.15;
      margin: 0 0 8px;
      color: var(--ink);
    }
    .gate p {
      margin: 0 0 24px;
      color: var(--ink-soft);
      line-height: 1.55;
      font-size: 15px;
    }
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-soft);
    }
    .field input {
      padding: 14px 16px;
      font-size: 16px;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg-soft);
      color: var(--ink);
      transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
      outline: none;
    }
    .field input:focus {
      border-color: var(--brand);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(0,100,168,0.12);
    }
    .gate button {
      margin-top: 16px;
      width: 100%;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: 0.02em;
      color: #fff;
      background: var(--brand);
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      transition: background .15s ease, transform .05s ease;
    }
    .gate button:hover { background: var(--brand-dark); }
    .gate button:active { transform: translateY(1px); }
    .gate button[disabled] { opacity: 0.6; cursor: progress; }
    .error {
      margin-top: 14px;
      font-size: 13px;
      color: #b00020;
      min-height: 18px;
    }

    footer {
      padding: 20px 32px 28px;
      text-align: center;
      color: var(--ink-soft);
      font-size: 12px;
      letter-spacing: 0.04em;
    }
    footer a { color: var(--brand); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 520px) {
      header { padding: 20px; }
      header img { height: 36px; }
      .gate { padding: 32px 24px; }
      .gate h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <header>
    <img src="assets/logo.jpg" alt="ELPO" />
    <span class="lang">DE</span>
  </header>

  <main id="main">
    <form class="gate" id="gate" autocomplete="off">
      <span class="badge">Gesch&uuml;tzte Vorschau</span>
      <h1>Passwort eingeben</h1>
      <p>Diese Seite ist Teil einer internen Vorschau. Bitte geben Sie das Passwort ein, um fortzufahren.</p>
      <div class="field">
        <label for="pw">Passwort</label>
        <input id="pw" name="pw" type="password" autocomplete="current-password" autofocus required />
      </div>
      <button type="submit" id="submit">Entsperren</button>
      <div class="error" id="error" role="alert" aria-live="polite"></div>
    </form>
  </main>

  <footer>
    &copy; <span id="yr"></span> ELPO &middot; <a href="https://www.elpo.eu" target="_blank" rel="noopener">elpo.eu</a>
  </footer>

          "iter": 200000
    };

    const b64ToBytes = (s) => Uint8Array.from(atob(s), c => c.charCodeAt(0));

    async function deriveKey(password, salt) {
      const km = await crypto.subtle.importKey(
        'raw',
        new TextEncoder().encode(password),
        { name: 'PBKDF2' },
        false,
        ['deriveKey']
      );
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations: PAYLOAD.iter, hash: 'SHA-256' },
        km,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );
    }

    async function tryUnlock(password) {
      const salt = b64ToBytes(PAYLOAD.salt);
      const iv = b64ToBytes(PAYLOAD.iv);
      const ct = b64ToBytes(PAYLOAD.ct);
      const key = await deriveKey(password, salt);
      const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
      return new TextDecoder().decode(plain);
    }

    const gate = document.getElementById('gate');
    const errEl = document.getElementById('error');
    const submitBtn = document.getElementById('submit');

    gate.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Wird entsperrt…';
      const pw = document.getElementById('pw').value;
      try {
        const html = await tryUnlock(pw);
        // Replace the entire body content with the decrypted landing page.
        document.body.innerHTML = html;
        // Re-execute any inline <script> tags (innerHTML inserts them inert).
        document.body.querySelectorAll('script').forEach(old => {
          const s = document.createElement('script');
          if (old.src) s.src = old.src;
          else s.textContent = old.textContent;
          old.parentNode.replaceChild(s, old);
        });
        window.scrollTo(0, 0);
      } catch (err) {
        errEl.textContent = 'Falsches Passwort. Bitte erneut versuchen.';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Entsperren';
        document.getElementById('pw').focus();
        document.getElementById('pw').select();
      }
    });
  </script>
